<!DOCTYPE html>
<html>
<head>
	<title>Physic Simulation | Attempt 1</title>
	<link rel="shortcut icon" href="Circle_-_black_simple.svg.png" type="image/x-icon">
	<style>
		@font-face {
			font-family: "CaskaydiaCove";
			src: url("./CaskaydiaMonoNerdFontMono-Regular.ttf");
		}

		.font-loader {
			font-family: 'CanvasFont';
			visibility: hidden;
			position: absolute;
		}

		html, body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #bb9457;
		}

		canvas {
			margin: 0 0 0 0;
			border: 5px solid #432818;
			border-radius: 1rem;
			background-color: #ffe6a7;
			image-rendering: pixelated;
			image-rendering: crisp-edges;
		}
	</style>
</head>
<body>
	<button onclick="addCircle()">Add Circle</button>
	<button onclick="removeCircle()">Remove Circle</button>
	<canvas id="canvas"></canvas>
	<script src="./js/constants.js"></script>
	<script src="./js/Sphere.js"></script>
	<script src="./js/main.js"></script>
</body>
</html>
